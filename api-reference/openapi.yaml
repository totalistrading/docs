  # =========================================================================
  # Market Maker
  # =========================================================================
  /mm/rfqs:
    get:
      operationId: listOpenRfqs
      tags: [Market Maker]
      summary: Open RFQs available for quoting
      security:
        - PrivyJWT: []
        - ApiKey: []
      parameters:
        - name: event_ticker
          in: query
          schema:
            type: string
        - name: min_bet
          in: query
          schema:
            type: number
        - name: max_bet
          in: query
          schema:
            type: number
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      rfqs:
                        type: array
                        items:
                          $ref: "#/components/schemas/MmRfq"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /mm/quotes:
    post:
      operationId: submitQuote
      tags: [Market Maker]
      summary: Submit a quote on an RFQ
      security:
        - PrivyJWT: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rfq_id, payout_odds]
              properties:
                rfq_id:
                  type: string
                  format: uuid
                payout_odds:
                  type: number
                  minimum: 1.01
                  maximum: 1000.0
                  description: "Multiplier (1.01–1000x). Must not be NaN/Inf."
                valid_for_seconds:
                  type: integer
                  minimum: 10
                  maximum: 3600
                  description: "Quote validity window. 10s–1h. Optional, defaults to 60s."
                leg_prices:
                  type: array
                  items:
                    type: object
                    required: [market_ticker, price]
                    properties:
                      market_ticker:
                        type: string
                      price:
                        type: number
                        minimum: 0
                        maximum: 100
                        description: Cents (0-100)
                  description: "Optional per-leg price snapshot."
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/QuoteMmView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      operationId: listMmQuotes
      tags: [Market Maker]
      summary: List MM's quotes
      security:
        - PrivyJWT: []
        - ApiKey: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/QuoteStatus"
        - name: rfq_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      quotes:
                        type: array
                        items:
                          $ref: "#/components/schemas/QuoteMmView"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /mm/quotes/{quoteId}/confirm:
    post:
      operationId: confirmQuote
      tags: [Market Maker]
      summary: Confirm accepted quote, triggers vault position creation
      description: |
        When MM confirms, a vault position record is created in pending state.
        The vault-job-service then processes it asynchronously to create the
        on-chain position atomically (single TX with both user and MM deposits).
      security:
        - PrivyJWT: []
        - ApiKey: []
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: confirmed
                      quote_id:
                        type: string
                        format: uuid
                      execution_id:
                        type: string
                        format: uuid

  /mm/quotes/{quoteId}/withdraw:
    post:
      operationId: withdrawQuote
      tags: [Market Maker]
