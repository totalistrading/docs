# ---------------------------------------------------------------------------
# WebSocket Contract (informational - not expressible in OpenAPI 3.0)
# See plan/06-api-contract-vault.md for the full WS contract including:
# - Channel authorization rules
# - Per-channel sequence numbers (seq field on all events)
# - Full event taxonomy with payload shapes
# - Resync protocol for reconnection recovery
# ---------------------------------------------------------------------------
#
# Endpoint: ws://localhost:8080/ws (dev) | wss://api.totalis.com/ws (prod)
#
# Authentication (both methods supported):
#   { "type": "auth", "api_key": "<your_api_key>" }
#   { "type": "auth", "token": "<privy_jwt>" }
#
# Channels:
#   rfqs:open          - All open RFQs (market makers)
#   rfq:{rfq_id}       - Updates on a specific RFQ (RFQ creator only)
#   mm:quotes:{mm_id}  - Quote status updates for a specific MM
#
# Server → Client event types (colon-delimited, not underscore):
#   auth:success, auth:error
#   subscribed, unsubscribed
#   rfq:created, rfq:status, rfq:cancelled, rfq:expired
#   quote:submitted, quote:accepted, quote:confirmed, quote:executed
#   quote:rejected, quote:expired, quote:withdrawn
#
#   Position lifecycle events:
#   position:created    - Position created on-chain (status: active)
#   position:settled    - Position settled (status: settled_win | settled_loss)
#   position:cancelled  - Position cancelled (status: cancelled)
#   position:failed     - Single creation attempt failed (retryable, status stays pending)
#   position:error      - Retries exhausted (terminal, status: error, needs manual intervention)
#
#   pong, error
#
# All server events include: type, seq, channel, timestamp
# seq is per-channel monotonically increasing - used for dedup and ordering.
